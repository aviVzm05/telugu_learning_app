[tool.ruff]
# Target Python 3.11+
target-version = "py311"

# Line length
line-length = 100

# Exclude directories
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    ".pytest_cache",
    "node_modules",
    "telugu_lessons",
    "progress_data",
]

[tool.ruff.lint]
# Rules to enable
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # Pyflakes
    "I",    # isort (import sorting)
    "N",    # pep8-naming
    "UP",   # pyupgrade
]

# Ignore specific rules
ignore = [
    "E501",  # Line too long (we set max-line-length instead)
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]  # Allow unused imports in __init__.py
"test_*.py" = ["F401"]    # Allow unused imports in tests
